# Near — production stack (Docker Compose)
#
# 1. cp .env.prod.example .env.prod  →  заполните секреты
# 2. docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
# 3. Откройте http://localhost (или ваш домен за TLS-прокси)
#
# Документация: docs/DEPLOYMENT_RU.md

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - near_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - near_internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - near_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - near_internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ENV: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:-}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-5}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-10}
      TASK_ARCHIVE_RETENTION_DAYS: ${TASK_ARCHIVE_RETENTION_DAYS:-30}
      LEGAL_OPERATOR_NAME: ${LEGAL_OPERATOR_NAME}
      LEGAL_CONTACT_EMAIL: ${LEGAL_CONTACT_EMAIL}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      NOTIFICATION_EMAIL_FROM: ${NOTIFICATION_EMAIL_FROM:-}
      DUE_REMINDER_HOURS: ${DUE_REMINDER_HOURS:-24}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - near_internal
    expose:
      - "8000"

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - near_internal

volumes:
  near_pg_data:
  near_redis_data:

networks:
  near_internal:
    driver: bridge
