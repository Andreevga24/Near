# Near: Redis для backend и будущего Celery
#
# База приложения — SQLite (файл backend/near.db после alembic upgrade head).
# Backend и frontend запускаются локально (см. README); в compose только Redis.
# План PostgreSQL: docs/POSTGRES_MIGRATION.md
#
services:
  redis:
    image: redis:7-alpine
    container_name: near-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
