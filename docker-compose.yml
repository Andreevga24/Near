# Near: Redis для backend и будущего Celery (БД по умолчанию — SQLite в файле backend/near.db)
services:
  redis:
    image: redis:7-alpine
    container_name: near-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
